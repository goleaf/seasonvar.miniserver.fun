name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
        options: >-
          --health-cmd "timeout 2 sh -c 'printf version\\r\\n | nc 127.0.0.1 11211'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_KEY: "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      APP_URL: http://localhost
      BROADCAST_CONNECTION: "null"
      CACHE_STORE: array
      CACHE_DOMAIN_STORE: redis-domain
      CACHE_HOT_STORE: memcached-hot
      CACHE_LOCK_STORE: redis-locks
      CACHE_METRICS_STORE: redis-domain
      CACHE_APPLICATION: seasonvar-ci
      CACHE_ENVIRONMENT: "run-${{ github.run_id }}"
      CACHE_PREFIX: "seasonvar-ci-${{ github.run_id }}-"
      MEMCACHED_HOT_PREFIX: "seasonvar-ci-${{ github.run_id }}-hot-"
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_SESSION_DB: 3
      REDIS_LOCK_DB: 5
      REDIS_CACHE_PREFIX: "seasonvar-ci-${{ github.run_id }}-cache-"
      REDIS_QUEUE_PREFIX: "seasonvar-ci-${{ github.run_id }}-queue-"
      REDIS_SESSION_PREFIX: "seasonvar-ci-${{ github.run_id }}-session-"
      REDIS_LOCK_PREFIX: "seasonvar-ci-${{ github.run_id }}-lock-"
      RUN_CACHE_INFRASTRUCTURE_TESTS: "true"
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3, redis, memcached
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cache required Rector analysis
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: output/rector/required
          key: ${{ runner.os }}-php-8.5-rector-${{ hashFiles('composer.lock', 'rector.php') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-rector-

      - name: Run backend quality gate
        run: bash scripts/ci-check.sh backend

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install npm dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: bash scripts/ci-check.sh frontend

  browser:
    name: Browser
    needs: [backend, frontend]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_KEY: "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      APP_URL: http://127.0.0.1:8013
      CACHE_STORE: array
      DB_CONNECTION: sqlite
      DB_DATABASE: output/playwright/browser.sqlite
      MAIL_MAILER: array
      PLAYBACK_ALLOWED_HOSTS: media.example.com
      PLAYBACK_ENFORCE_PUBLIC_DNS: "false"
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          npm ci

      - name: Run browser quality gate
        run: bash scripts/ci-check.sh browser

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: output/playwright
          if-no-files-found: ignore
          retention-days: 7
