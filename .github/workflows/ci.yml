name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
        options: >-
          --health-cmd "timeout 2 sh -c 'printf version\\r\\n | nc 127.0.0.1 11211'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_KEY: "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      APP_URL: http://localhost
      BROADCAST_CONNECTION: "null"
      CACHE_STORE: array
      CACHE_DOMAIN_STORE: redis-domain
      CACHE_HOT_STORE: memcached-hot
      CACHE_LOCK_STORE: redis-locks
      CACHE_METRICS_STORE: redis-domain
      CACHE_APPLICATION: seasonvar-ci
      CACHE_ENVIRONMENT: "run-${{ github.run_id }}"
      CACHE_PREFIX: "seasonvar-ci-${{ github.run_id }}-"
      MEMCACHED_HOT_PREFIX: "seasonvar-ci-${{ github.run_id }}-hot-"
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_CACHE_DB: 1
      REDIS_QUEUE_DB: 2
      REDIS_SESSION_DB: 3
      REDIS_LOCK_DB: 5
      REDIS_CACHE_PREFIX: "seasonvar-ci-${{ github.run_id }}-cache-"
      REDIS_QUEUE_PREFIX: "seasonvar-ci-${{ github.run_id }}-queue-"
      REDIS_SESSION_PREFIX: "seasonvar-ci-${{ github.run_id }}-session-"
      REDIS_LOCK_PREFIX: "seasonvar-ci-${{ github.run_id }}-lock-"
      RUN_CACHE_INFRASTRUCTURE_TESTS: "true"
      MAIL_MAILER: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3, redis, memcached
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.5-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate Composer files
        run: composer validate --strict

      - name: Audit Composer dependencies
        run: composer audit

      - name: Check PHP formatting
        run: ./vendor/bin/pint --test --format=github

      - name: Run PHP syntax lint
        run: find app bootstrap config database routes tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate Laravel caches
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Run Laravel tests
        run: php artisan test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org/

      - name: Install npm dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Build frontend assets
        run: npm run build
